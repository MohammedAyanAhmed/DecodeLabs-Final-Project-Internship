<!DOCTYPE html>
<html>

<head>

    <title>Student Management System</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <h1>Student Management System</h1>

    <form id="studentForm">

        <input
        type="text"
        id="name"
        placeholder="Enter Name"
        required>

        <input
        type="email"
        id="email"
        placeholder="Enter Email"
        required>

        <input
        type="text"
        id="course"
        placeholder="Enter Course"
        required>

        <button type="submit">

            Add Student

        </button>

    </form>

    <hr>

    <div id="students"></div>

    <script src="app.js"></script>

</body>

</html>
